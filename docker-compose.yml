version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5040:5040"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./logs:/root/korst-backend/logs
    restart: unless-stopped
    networks:
      - korst-net

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: korst_user
      POSTGRES_PASSWORD: O7KtW2OAi6Kd9VofbNYnlji5OJBgE03N
      POSTGRES_DB: korst_db
    ports:
      - "5555:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - korst-net

volumes:
  db_data:

networks:
  korst-net:
    driver: bridge