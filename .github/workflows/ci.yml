name: Go CI

on:
  push:
    branches: [ "main", "backend", "backend-dev" ]
  pull_request:
    branches: [ "main", "backend", "backend-dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Get dependencies
      run: go mod download

    - name: Run tests
      run: go test ./... -v