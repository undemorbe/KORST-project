name: Flutter CI

on:
  push:
    branches: [ "main", "frontend", "frontend-dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "frontend", "frontend-dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Prepare .env for PR
      if: github.event_name == 'pull_request'
      run: cp .env.example .env

    - name: Prepare .env for push (from secrets)
      if: github.event_name == 'push'
      shell: bash
      run: |
        if [ -n "${{ secrets.DOTENV_BASE64 }}" ]; then
          echo "${{ secrets.DOTENV_BASE64 }}" | base64 --decode > .env
          exit 0
        fi
        if [ -n "${{ secrets.DOTENV }}" ]; then
          printf "%s" "${{ secrets.DOTENV }}" > .env
          exit 0
        fi
        echo "Missing DOTENV_BASE64 or DOTENV secret" >&2
        exit 1

    - name: Get dependencies
      run: flutter pub get

    # - name: Analyze
    #   run: flutter analyze

    - name: Run tests
      run: flutter test

    - name: Build release APK
      if: github.event_name == 'push'
      run: flutter build apk --release

    - name: Upload APK artifact
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error

    - name: Publish APK to GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
